name: Update Wiki Sidebar

on:
  # Trigger when wiki pages are edited via GitHub UI
  gollum:
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Run when we push certain files to main repo that should be in wiki
  push:
    branches:
      - main
    paths:
      - 'wiki/**/*.md'

permissions:
  contents: write

jobs:
  update-sidebar:
    runs-on: windows-latest
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main-repo
      
      - name: Checkout wiki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Sync wiki files from main repo
        shell: pwsh
        run: |
          # Copy markdown files from main repo wiki/ folder to wiki repo
          $sourceFiles = Get-ChildItem -Path main-repo/wiki -Filter *.md -ErrorAction SilentlyContinue
          if ($sourceFiles) {
            Write-Host "Syncing wiki files from main repo..."
            foreach ($file in $sourceFiles) {
              Copy-Item $file.FullName -Destination wiki-repo/ -Force
              Write-Host "  Copied: $($file.Name)"
            }
          } else {
            Write-Host "No files to sync from main repo wiki/ folder"
          }
      
      - name: Generate sidebar
        shell: pwsh
        run: |
          # Run the generation script
          cd main-repo
          ./Generate-WikiSidebar.ps1 -WikiPath ../wiki-repo
      
      - name: Commit and push sidebar
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Only commit if there are changes
          if (git diff --staged --quiet) {
            Write-Host "No changes to wiki"
          } else {
            git commit -m "Auto-update wiki content and sidebar [bot]"
            git push
            Write-Host "✅ Wiki updated!"
          }
